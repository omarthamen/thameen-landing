<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>أكاديمية ثَمين</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css?v=4" />
  <link rel="stylesheet" href="academy.css?v=5" />
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- ====== شاشة الدخول ====== -->
  <section id="loginView" class="login-wrap">
    <form id="loginForm" class="login-card">
      <span class="brand-diamond">◆</span>
      <h1>أكاديمية ثَمين</h1>
      <p class="login-sub">دخول المشتركين — تحدّي ٩٠ يوم</p>
      <p id="verBadge" style="color:#5BB8E8;font-size:12px;font-weight:700;margin-bottom:16px">إصدار ٢ ✅</p>
      <input type="email" id="email" class="fld" placeholder="الإيميل" autocomplete="username" required />
      <input type="password" id="password" class="fld" placeholder="كلمة السر" autocomplete="current-password" required />
      <button type="submit" class="btn btn-primary" id="loginBtn">دخول</button>
      <p class="msg" id="loginMsg" role="status"></p>
      <p class="login-help">ما عندك حساب؟ تواصل معنا على واتساب بعد الاشتراك.</p>
    </form>
  </section>

  <!-- ====== المنصّة ====== -->
  <section id="appView" hidden>
    <header class="acad-nav">
      <a class="nav-brand" href="#" id="navHome"><span class="brand-diamond">◆</span> أكاديمية ثَمين <small style="color:#5BB8E8;font-size:11px;font-weight:700">v12</small></a>
      <div class="nav-right">
        <span class="nav-stat">إنجازك <b id="progPct">0%</b></span>
        <span class="nav-stat">مكالماتك <b id="callsLeft">3</b></span>
        <span class="nav-name" id="meName"></span>
        <button class="btn-logout" id="logoutBtn">تسجيل الخروج</button>
      </div>
    </header>

    <div class="acad-grid" id="acadGrid">
      <!-- دوراتي (يمين) -->
      <aside class="col courses-col">
        <h3 class="col-h">دوراتي</h3>
        <div id="coursesCol"></div>
      </aside>

      <!-- المشغّل (وسط) -->
      <div class="col center-col">
        <h2 class="lesson-title" id="lTitle">—</h2>
        <div class="player-box"><div id="playerHost"></div></div>
        <div class="watch-wrap">
          <div class="watch-prog"><span id="watchFill"></span></div>
          <p class="watch-label" id="watchLabel">شغّل الدرس — يُحتسب إنجازك تلقائيًا حسب مشاهدتك</p>
        </div>
        <div class="lesson-desc" id="lDesc"></div>
      </div>

      <!-- دروس القسم (يسار) -->
      <aside class="col lessons-col">
        <h3 class="col-h">دروس</h3>
        <div id="plList"></div>
      </aside>
    </div>

    <footer class="acad-footer">
      <div class="foot-socials" id="footSocials"></div>
      <p class="foot-copy">◆ أكاديمية ثَمين — جميع الحقوق محفوظة</p>
    </footer>
  </section>

  <script src="https://cdn.embed.ly/player-0.1.0.min.js"></script>
  <script src="academy.js?v=12"></script>
</body>
</html>
