<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>أكاديمية ثَمين</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css?v=3" />
  <link rel="stylesheet" href="academy.css?v=3" />
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- ====== شاشة الدخول ====== -->
  <section id="loginView" class="login-wrap">
    <form id="loginForm" class="login-card">
      <span class="brand-diamond">◆</span>
      <h1>أكاديمية ثَمين</h1>
      <p class="login-sub">دخول المشتركين — تحدّي ٩٠ يوم</p>
      <p id="verBadge" style="color:#5BB8E8;font-size:12px;font-weight:700;margin-bottom:16px">إصدار ١ ✅</p>
      <input type="email" id="email" class="fld" placeholder="الإيميل" autocomplete="username" required />
      <input type="password" id="password" class="fld" placeholder="كلمة السر" autocomplete="current-password" required />
      <button type="submit" class="btn btn-primary" id="loginBtn">دخول</button>
      <p class="msg" id="loginMsg" role="status"></p>
      <p class="login-help">ما عندك حساب؟ تواصل معنا على واتساب بعد الاشتراك.</p>
    </form>
  </section>

  <!-- ====== المنصّة ====== -->
  <section id="appView" hidden>
    <header class="topbar">
      <div class="brand"><span class="brand-diamond">◆</span><b>أكاديمية ثَمين</b></div>
      <div class="topbar-actions">
        <span class="me-name" id="meName"></span>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">خروج</button>
      </div>
    </header>

    <!-- شريط التقدّم العام -->
    <div class="prog-hero">
      <div class="prog-stat">
        <span class="prog-pct" id="progPct">0%</span>
        <span class="prog-lbl">نسبة إنجازك</span>
      </div>
      <div class="prog-bar"><span id="progFill"></span></div>
      <div class="prog-stat">
        <span class="prog-pct" id="callsLeft">3</span>
        <span class="prog-lbl">مكالمات متبقّية</span>
      </div>
    </div>

    <main class="academy" id="academyMain">
      <p class="hint" style="text-align:center;padding:40px">جارٍ تحميل الدورة…</p>
    </main>
  </section>

  <script src="academy.js?v=4"></script>
</body>
</html>
