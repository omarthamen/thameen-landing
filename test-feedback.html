<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ردود الفعل — تجريبي</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --text-muted: rgba(255,255,255,0.6);
      --primary: #c9a227;
      --primary-glow: rgba(201,162,39,0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 60px 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }

    /* Section */
    .feedback-section {
      text-align: center;
    }

    /* Dynamic Title */
    .title-wrapper {
      position: relative;
      height: 120px;
      margin-bottom: 40px;
      overflow: hidden;
    }
    .dynamic-title {
      position: absolute;
      width: 100%;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dynamic-title.active {
      opacity: 1;
      transform: translateY(0);
    }
    .dynamic-title.exit-up {
      opacity: 0;
      transform: translateY(-40px);
    }
    .dynamic-title.enter-down {
      opacity: 0;
      transform: translateY(40px);
    }
    .section-title {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .section-title span {
      background: linear-gradient(135deg, var(--primary), #e8d48b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .section-sub {
      color: var(--text-muted);
      font-size: 1.15rem;
    }

    /* Type Badge */
    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 20px;
      transition: all 0.5s ease;
    }
    .type-badge.creators {
      background: rgba(201, 162, 39, 0.15);
      border: 1px solid rgba(201, 162, 39, 0.3);
      color: var(--primary);
    }
    .type-badge.subscribers {
      background: rgba(39, 162, 201, 0.15);
      border: 1px solid rgba(39, 162, 201, 0.3);
      color: #27a2c9;
    }
    .type-badge .icon {
      font-size: 1.1rem;
    }

    /* Slider */
    .slider-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px 0;
    }
    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
    }
    .slider-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      transform: translateY(-50%) scale(1.1);
    }
    .slider-btn.prev { right: calc(50% + 180px); }
    .slider-btn.next { left: calc(50% + 180px); }

    .slider-container {
      position: relative;
      width: 320px;
      height: 520px;
    }
    .slider-item {
      position: absolute;
      top: 0;
      left: 50%;
      width: 280px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .slider-item img {
      width: 100%;
      display: block;
    }

    /* Positions */
    .slider-item.pos-left {
      transform: translateX(-165%) scale(0.8);
      opacity: 0.5;
      z-index: 1;
    }
    .slider-item.pos-center {
      transform: translateX(-50%) scale(1);
      opacity: 1;
      z-index: 3;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .slider-item.pos-right {
      transform: translateX(65%) scale(0.8);
      opacity: 0.5;
      z-index: 1;
    }
    .slider-item.pos-hidden {
      transform: translateX(-50%) scale(0.6);
      opacity: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Counter */
    .slider-counter {
      margin-top: 30px;
      font-size: 0.95rem;
      color: var(--text-muted);
    }
    .slider-counter .current {
      color: var(--primary);
      font-weight: 600;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="feedback-section">

      <!-- Dynamic Titles -->
      <div class="title-wrapper">
        <div class="dynamic-title active" id="creatorsTitle">
          <div class="type-badge creators">
            <span class="icon">🎬</span>
            <span>صناع المحتوى</span>
          </div>
          <h2 class="section-title">ردود فعل من <span>اشتغلت معهم</span></h2>
          <p class="section-sub">ثقة حقيقية من يوتيوبرز ومؤثرين</p>
        </div>

        <div class="dynamic-title enter-down" id="subscribersTitle">
          <div class="type-badge subscribers">
            <span class="icon">🎓</span>
            <span>مشتركين الدورة</span>
          </div>
          <h2 class="section-title">آراء <span>طلاب الأكاديمية</span></h2>
          <p class="section-sub">تجارب حقيقية من مشتركين ثمين</p>
        </div>
      </div>

      <!-- Slider -->
      <div class="slider-wrapper">
        <button class="slider-btn prev" id="prevBtn">‹</button>
        <div class="slider-container" id="feedbackSlider"></div>
        <button class="slider-btn next" id="nextBtn">›</button>
      </div>

      <div class="slider-counter">
        <span class="current" id="currentNum">1</span> / <span id="totalNum">10</span>
      </div>

    </section>
  </div>

  <script>
    // الصور مع النوع
    const feedbackItems = [
      // صناع المحتوى
      { src: 'assets/feedback/feedback-1.png', type: 'creator' },  // بندريتا
      { src: 'assets/feedback/feedback-2.png', type: 'creator' },  // ريان أوسمز

      // مشتركين الدورة
      { src: 'assets/feedback/01-Ehab.png', type: 'subscriber' },
      { src: 'assets/feedback/02-abdulsalam.png', type: 'subscriber' },
      { src: 'assets/feedback/03-mortada.png', type: 'subscriber' },
      { src: 'assets/feedback/04-Anonymous.png', type: 'subscriber' },
      { src: 'assets/feedback/05-Ali-Yas.png', type: 'subscriber' },
      { src: 'assets/feedback/06-mohamed-kaito.png', type: 'subscriber' },
      { src: 'assets/feedback/07-Ehab-2.png', type: 'subscriber' },
      { src: 'assets/feedback/feedback-3.png', type: 'subscriber' },  // عبدالسلام
    ];

    let currentIndex = 0;
    let currentType = 'creator';
    const total = feedbackItems.length;

    const slider = document.getElementById('feedbackSlider');
    const creatorsTitle = document.getElementById('creatorsTitle');
    const subscribersTitle = document.getElementById('subscribersTitle');
    const currentNum = document.getElementById('currentNum');
    const totalNum = document.getElementById('totalNum');

    totalNum.textContent = total;

    // Build slider
    slider.innerHTML = feedbackItems.map((item, i) =>
      `<div class="slider-item" data-index="${i}"><img src="${item.src}" alt="feedback"></div>`
    ).join('');

    function updateSlider() {
      const items = slider.querySelectorAll('.slider-item');

      items.forEach((item, i) => {
        item.className = 'slider-item';
        const diff = (i - currentIndex + total) % total;

        if (diff === 0) item.classList.add('pos-center');
        else if (diff === 1) item.classList.add('pos-right');
        else if (diff === total - 1) item.classList.add('pos-left');
        else item.classList.add('pos-hidden');
      });

      // Update counter
      currentNum.textContent = currentIndex + 1;

      // Update title based on type
      const newType = feedbackItems[currentIndex].type;
      if (newType !== currentType) {
        if (newType === 'subscriber') {
          creatorsTitle.className = 'dynamic-title exit-up';
          subscribersTitle.className = 'dynamic-title active';
        } else {
          subscribersTitle.className = 'dynamic-title exit-up';
          creatorsTitle.className = 'dynamic-title active';
        }
        currentType = newType;
      }
    }

    function slide(dir) {
      currentIndex = (currentIndex + dir + total) % total;
      updateSlider();
    }

    document.getElementById('prevBtn').addEventListener('click', () => slide(-1));
    document.getElementById('nextBtn').addEventListener('click', () => slide(1));

    // Auto-slide
    setInterval(() => slide(1), 4000);

    // Initialize
    updateSlider();
  </script>
</body>
</html>
